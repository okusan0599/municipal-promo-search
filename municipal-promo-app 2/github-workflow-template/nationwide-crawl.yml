name: Nationwide municipal crawl

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "municipal-promo-app 2"
    env:
      CRAWL_BATCH_SIZE: "35"
      CRAWL_DELAY_SECONDS: "0.25"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "municipal-promo-app 2/requirements.txt"
      - run: pip install -r requirements.txt
      - run: python -m app.crawler
      - name: Commit updated data
        run: |
          git config user.name "municipal-crawl-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update nationwide municipal projects"
            git push
          fi
