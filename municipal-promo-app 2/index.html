<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自治体プロモーション公示検索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #17212b;
      --muted: #6b7785;
      --line: #dfe5eb;
      --accent: #0c6cf2;
      --accent-dark: #0959c7;
      --chip: #edf4ff;
      --danger: #d64545;
      --success: #168a52;
      --shadow: 0 8px 28px rgba(20, 32, 50, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { color: inherit; }
    .app-shell { min-height: 100vh; }
    header {
      background: linear-gradient(135deg, #0a4ea3 0%, #0c6cf2 70%, #4b8ff5 100%);
      color: white;
      padding: 22px 28px;
      box-shadow: 0 4px 18px rgba(11, 76, 160, .22);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand h1 { margin: 0; font-size: 24px; letter-spacing: .02em; }
    .brand p { margin: 7px 0 0; opacity: .9; font-size: 13px; }
    .badge {
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      white-space: nowrap;
    }
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 22px;
    }
    .panel {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(220, 227, 234, .9);
    }
    .filters { padding: 20px; height: fit-content; position: sticky; top: 18px; }
    .filters h2 { margin: 0 0 18px; font-size: 18px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 7px; color: #3d4a57; }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(12,108,242,.12); }
    .range { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .check-row { display: flex; align-items: center; gap: 9px; font-size: 13px; }
    .check-row input { width: auto; }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { background: #eef2f6; color: #34404d; width: 100%; margin-top: 8px; }
    .content { min-width: 0; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .results-count { font-weight: 700; }
    .results-count span { color: var(--accent); font-size: 22px; }
    .toolbar-right { display: flex; gap: 10px; align-items: center; }
    .toolbar-right select { width: 210px; }
    .cards { display: grid; gap: 14px; }
    .card { padding: 20px; }
    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .location { font-size: 12px; color: var(--muted); margin-bottom: 7px; }
    .title { margin: 0; font-size: 19px; line-height: 1.5; }
    .status { border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .status.open { color: var(--success); background: #e8f7ef; }
    .status.soon { color: #a95c00; background: #fff3df; }
    .status.closed { color: var(--muted); background: #eef1f4; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .chip { background: var(--chip); color: #235896; border-radius: 999px; padding: 5px 10px; font-size: 12px; }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px,1fr));
      gap: 12px;
      background: #f8fafc;
      border: 1px solid #edf0f3;
      border-radius: 12px;
      padding: 13px;
    }
    .meta-label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .meta-value { font-size: 14px; font-weight: 700; }
    .budget { color: var(--accent); }
    .summary { margin: 14px 0 0; color: #4a5764; font-size: 13px; line-height: 1.7; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 16px; }
    .source { font-size: 11px; color: var(--muted); }
    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
    }
    .source-link:hover { background: var(--accent-dark); }
    .empty { padding: 50px 20px; text-align: center; color: var(--muted); }
    .notice { margin-top: 18px; font-size: 11px; color: var(--muted); line-height: 1.6; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; padding: 14px; }
      .filters { position: static; }
      .meta-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-right select { width: 100%; }
    }
    @media (max-width: 560px) {
      .header-inner { align-items: flex-start; flex-direction: column; }
      .card-top, .card-footer { flex-direction: column; align-items: flex-start; }
      .meta-grid { grid-template-columns: 1fr; }
      .source-link { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>自治体プロモーション公示検索</h1>
        <p>広報・観光・SNS・動画・イベント・ブランディング領域の公募案件を横断検索</p>
      </div>
      <div class="badge" id="liveBadge">LIVE / 読み込み中</div>
    </div>
  </header>

  <main>
    <aside class="panel filters">
      <h2>検索条件</h2>
      <div class="field">
        <label for="keyword">キーワード</label>
        <input id="keyword" type="search" placeholder="例：観光、動画、SNS" />
      </div>
      <div class="field">
        <label for="area">地域ブロック</label>
        <select id="area">
          <option value="">全国</option>
        </select>
      </div>
      <div class="field">
        <label for="region">都道府県</label>
        <select id="region">
          <option value="">すべて</option>
        </select>
      </div>
      <div class="field">
        <label for="theme">テーマ</label>
        <select id="theme">
          <option value="">すべて</option>
        </select>
      </div>
      <div class="field">
        <label>予算幅（万円）</label>
        <div class="range">
          <input id="budgetMin" type="number" min="0" placeholder="下限" />
          <input id="budgetMax" type="number" min="0" placeholder="上限" />
        </div>
      </div>
      <div class="field">
        <label for="noticeFrom">公示日（以降）</label>
        <input id="noticeFrom" type="date" />
      </div>
      <div class="field">
        <label for="deadlineTo">提出期限（以前）</label>
        <input id="deadlineTo" type="date" />
      </div>
      <div class="field check-row">
        <input id="openOnly" type="checkbox" checked />
        <label for="openOnly" style="margin:0">募集中のみ表示</label>
      </div>
      <button class="btn btn-primary" id="searchBtn">この条件で検索</button>
      <button class="btn btn-secondary" id="resetBtn">条件をリセット</button>
      <p class="notice">各案件の「自治体ページを見る」から、元の公示ページへ移動します。実運用時は原文URLと最終確認日時を保存します。</p>
    </aside>

    <section class="content">
      <div class="panel toolbar">
        <div class="results-count"><span id="count">0</span> 件見つかりました</div>
        <div class="toolbar-right">
          <select id="sort">
            <option value="deadlineAsc">提出期限が近い順</option>
            <option value="noticeDesc">公示日が新しい順</option>
            <option value="budgetDesc">予算が高い順</option>
            <option value="budgetAsc">予算が低い順</option>
          </select>
        </div>
      </div>
      <div id="cards" class="cards"></div>
    </section>
  </main>
</div>

<script>
const TARGET_REGIONS = [
  {area:'北海道', region:'北海道'},
  {area:'九州', region:'福岡県'},
  {area:'九州', region:'佐賀県'},
  {area:'中国', region:'山口県'},
  {area:'九州', region:'鹿児島県'},
  {area:'近畿', region:'兵庫県'}
];

let projects = [];
let dataMode = 'loading';
const $ = id => document.getElementById(id);
const areaEl = $('area'), regionEl = $('region'), themeEl = $('theme');
const cardsEl = $('cards'), countEl = $('count');
const areaOrder = ['北海道','東北','北関東','南関東','甲信越','北陸','東海','近畿','中国','四国','九州','沖縄'];

function normalizedProject(p) {
  return {
    ...p,
    area: p.area || '', region: p.region || '', municipality: p.municipality || '',
    title: p.title || '名称未確認', summary: p.summary || '',
    theme: Array.isArray(p.theme) ? p.theme : (Array.isArray(p.themes) ? p.themes : []),
    budget: p.budget === '' || p.budget == null ? null : Number(p.budget),
    status: ['open','soon','closed'].includes(p.status) ? p.status : inferStatus(p.deadline),
    sourceUrl: p.sourceUrl || p.source_url || '#',
    sourceName: p.sourceName || p.source_name || '自治体公式',
    noticeDate: p.noticeDate || p.notice_date || null,
    presentationDate: p.presentationDate || p.presentation_date || null,
    lastChecked: p.lastChecked || p.last_checked || null
  };
}
function inferStatus(deadline) {
  if (!deadline || !/^\d{4}-\d{2}-\d{2}$/.test(deadline)) return 'open';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(deadline + 'T00:00:00');
  if (d < today) return 'closed';
  return (d - today) / 86400000 <= 7 ? 'soon' : 'open';
}
async function loadProjects() {
  const badge = $('liveBadge');
  let loaded = [];
  try {
    const response = await fetch('/api/projects', {cache:'no-store'});
    if (!response.ok) throw new Error('API unavailable');
    const payload = await response.json();
    loaded = Array.isArray(payload) ? payload : (payload.projects || []);
  } catch (_) {
    try {
      const response = await fetch('./data/projects.json', {cache:'no-store'});
      if (!response.ok) throw new Error('JSON unavailable');
      const payload = await response.json();
      loaded = Array.isArray(payload) ? payload : (payload.projects || []);
    } catch (_) {}
  }
  if (loaded.length) {
    projects = loaded.map(normalizedProject);
    dataMode = 'live';
    badge.textContent = `LIVE DATA / ${projects.length}件`;
  } else {
    projects = [];
    dataMode = 'empty';
    badge.textContent = 'LIVE / 初回収集中';
  }
  rebuildFilters();
  render();
}

function setOptions(el, firstLabel, values, selected='') {
  el.replaceChildren(new Option(firstLabel, ''));
  values.forEach(v => el.add(new Option(v, v)));
  if ([...el.options].some(o => o.value === selected)) el.value = selected;
}
function rebuildFilters() {
  const selectedArea = areaEl.value, selectedRegion = regionEl.value, selectedTheme = themeEl.value;
  const areas = [...new Set([...projects.map(p=>p.area), ...TARGET_REGIONS.map(p=>p.area)].filter(Boolean))].sort((a,b)=>{
    const ai=areaOrder.indexOf(a), bi=areaOrder.indexOf(b);
    return (ai<0?999:ai)-(bi<0?999:bi) || a.localeCompare(b,'ja');
  });
  setOptions(areaEl, '全国', areas, selectedArea);
  rebuildRegions(selectedRegion);
  const themes = [...new Set(projects.flatMap(p=>p.theme).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja'));
  setOptions(themeEl, 'すべて', themes, selectedTheme);
}
function rebuildRegions(selected='') {
  const regions = [...new Set([...projects.filter(p=>!areaEl.value || p.area===areaEl.value).map(p=>p.region), ...TARGET_REGIONS.filter(p=>!areaEl.value || p.area===areaEl.value).map(p=>p.region)].filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja'));
  setOptions(regionEl, 'すべて', regions, selected);
}
function formatDate(value) {
  if (!value) return '未確認';
  if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return escapeHtml(String(value));
  const [y,m,d]=value.split('-'); return `${y}/${m}/${d}`;
}
function statusLabel(s) { return s==='open'?'募集中':s==='soon'?'締切間近':'募集終了'; }
function escapeHtml(v='') { return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function safeUrl(v) { try { const u=new URL(v, location.href); return ['http:','https:'].includes(u.protocol)?u.href:'#'; } catch { return '#'; } }
function compareDate(a,b,empty='9999-12-31') { return (a||empty).localeCompare(b||empty); }

function render() {
  const keyword=$('keyword').value.trim().toLocaleLowerCase('ja');
  const budgetMin=$('budgetMin').value===''?null:Number($('budgetMin').value);
  const budgetMax=$('budgetMax').value===''?null:Number($('budgetMax').value);
  const noticeFrom=$('noticeFrom').value, deadlineTo=$('deadlineTo').value;
  const openOnly=$('openOnly').checked, sort=$('sort').value;
  let result=projects.filter(p=>{
    const hay=[p.title,p.summary,p.area,p.region,p.municipality,...p.theme].join(' ').toLocaleLowerCase('ja');
    if (keyword && !hay.includes(keyword)) return false;
    if (areaEl.value && p.area!==areaEl.value) return false;
    if (regionEl.value && p.region!==regionEl.value) return false;
    if (themeEl.value && !p.theme.includes(themeEl.value)) return false;
    if (budgetMin!==null && (p.budget===null || p.budget<budgetMin)) return false;
    if (budgetMax!==null && (p.budget===null || p.budget>budgetMax)) return false;
    if (noticeFrom && (!p.noticeDate || p.noticeDate<noticeFrom)) return false;
    if (deadlineTo && (!p.deadline || p.deadline>deadlineTo)) return false;
    if (openOnly && p.status==='closed') return false;
    return true;
  });
  result.sort((a,b)=>{
    if(sort==='noticeDesc') return compareDate(b.noticeDate,a.noticeDate,'0000-00-00');
    if(sort==='budgetDesc') return (b.budget??-Infinity)-(a.budget??-Infinity);
    if(sort==='budgetAsc') return (a.budget??Infinity)-(b.budget??Infinity);
    return compareDate(a.deadline,b.deadline);
  });
  countEl.textContent=result.length;
  if(!result.length){
    const message = projects.length ? '条件に一致する案件がありません。' : '自治体サイトから初回データを収集中です。数分後に再読み込みしてください。';
    const sub = projects.length ? '条件を緩めるか、リセットしてください。' : '対象：北海道・福岡県・佐賀県・山口県・鹿児島県・兵庫県';
    cardsEl.innerHTML=`<div class="panel empty"><strong>${message}</strong><br><span>${sub}</span></div>`;
    return;
  }
  cardsEl.innerHTML=result.map(p=>`<article class="panel card">
    <div class="card-top"><div><div class="location">${escapeHtml([p.area,p.region,p.municipality].filter(Boolean).join(' / '))}</div><h3 class="title">${escapeHtml(p.title)}</h3></div><span class="status ${p.status}">${statusLabel(p.status)}</span></div>
    <div class="chips">${p.theme.map(t=>`<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
    <div class="meta-grid"><div><span class="meta-label">公示日</span><span class="meta-value">${formatDate(p.noticeDate)}</span></div><div><span class="meta-label">提案・提出期限</span><span class="meta-value">${formatDate(p.deadline)}</span></div><div><span class="meta-label">プレゼン日</span><span class="meta-value">${formatDate(p.presentationDate)}</span></div><div><span class="meta-label">予算上限</span><span class="meta-value budget">${p.budget===null?'未確認':p.budget.toLocaleString('ja-JP')+'万円'}</span></div></div>
    <p class="summary">${escapeHtml(p.summary)}</p>
    <div class="card-footer"><span class="source">${escapeHtml(p.sourceName)} / 最終確認：${p.lastChecked?new Date(p.lastChecked).toLocaleString('ja-JP'):'未取得'}</span><a class="source-link" href="${safeUrl(p.sourceUrl)}" target="_blank" rel="noopener noreferrer">自治体ページを見る ↗</a></div>
  </article>`).join('');
}

const liveInputs=['keyword','budgetMin','budgetMax','noticeFrom','deadlineTo','openOnly'];
liveInputs.forEach(id=>$(id).addEventListener(id==='keyword'?'input':'change',render));
$('searchBtn').addEventListener('click',render);
$('sort').addEventListener('change',render);
areaEl.addEventListener('change',()=>{ rebuildRegions(); render(); });
regionEl.addEventListener('change',render); themeEl.addEventListener('change',render);
$('resetBtn').addEventListener('click',()=>{
  $('keyword').value=''; $('budgetMin').value=''; $('budgetMax').value=''; $('noticeFrom').value=''; $('deadlineTo').value=''; $('openOnly').checked=true;
  areaEl.value=''; rebuildRegions(); regionEl.value=''; themeEl.value=''; $('sort').value='deadlineAsc'; render();
});
loadProjects();
</script>
</body>
</html>
